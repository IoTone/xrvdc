# Source: https://github.com/Snapchat/Spectacles-Sample (default branch: main)
# Consumed by the `spectacles-samples` shortcode. Folder/GIF paths contain
# spaces; the shortcode URL-encodes them at render time.
# Bilingual: *_ja fields are used on Japanese pages (fall back to English).
# `tags` and sample `name` stay English on purpose — they are API / product
# proper nouns kept in English in Japanese developer documentation.
repo: "https://github.com/Snapchat/Spectacles-Sample"
tree: "https://github.com/Snapchat/Spectacles-Sample/tree/main"
raw: "https://raw.githubusercontent.com/Snapchat/Spectacles-Sample/main"

categories:
  - name: "AI"
    name_ja: "AI"
    blurb: "AI-powered experiences and integrations."
    blurb_ja: "AI を活用した体験と連携。"
    samples:
      - name: "AI Playground"
        dir: "AI Playground"
        gif: "AI Playground/README-ref/sample-list-ai-playground-rounded-edges.gif"
        desc: "Sample project for AI using the Spectacles Remote Service Gateway."
        desc_ja: "Spectacles Remote Service Gateway を使った AI のサンプルプロジェクト。"
