        gif: "Agentic Playground/README-ref/sample-list-agentic-playground-rounded-edges.gif"
        desc: "Advanced AI playground demonstrating agentic behaviors and autonomous interactions."
        desc_ja: "エージェント的な振る舞いと自律的なインタラクションを示す高度な AI プレイグラウンド。"
