baseURL = "https://xrvdc.pages.dev/"
title = "XR VisionDevCamp Fukuoka 2026"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
theme = ["xrvdc-neon", "reveal-hugo"]
disableKinds = ["sitemap", "RSS", "taxonomy", "term"]
buildFuture = true

[markup.goldmark.renderer]
  unsafe = true

[outputFormats.Reveal]
  baseName = "index"
  mediaType = "text/html"
  isHTML = true

[params]
  author = "XR VisionDevCamp"
  description = "XR VisionDevCamp returns to Fukuoka in Summer 2026."

[params.staging]
  version = "1.5"
  eventDates = "26 – 28 June 2026"
  eventDateShort = "06.26.26"

# Status labels are defined per-language under [languages.<lang>.params.statusLabels].
# `staging` renders on /staging/* URLs, `production` renders everywhere else.

[params.reveal_hugo]
  theme = "black"
  history = true
  slide_number = true
  transition = "slide"
  transition_speed = "default"
  margin = 0.1

# ───── Languages ─────
[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    [languages.en.params]
      description = "XR VisionDevCamp returns to Fukuoka in Summer 2026."
      venue = "Engineer Café · CIC (One Building)"
    [languages.en.params.statusLabels]
      staging = "STAGING"
      production = "REGISTRATION OPEN"
