<footer class="site-footer">
  <div class="site-footer__inner">
    <span>© {{ now.Year }} XR VisionDevCamp · Fukuoka</span>
    {{ with .Site.Params.staging }}
      <span class="site-footer__version">
        STAGING · v{{ .version }}<span class="ts">// BUILD {{ now.Format "2006-01-02" }}</span>
      </span>
    {{ end }}
    {{ $contactURL := "/staging/contact/" | relLangURL }}
    {{ if ne .RelPermalink $contactURL }}
      <a href="{{ $contactURL }}">{{ i18n "contact" | default "Contact" }} →</a>
    {{ end }}
  </div>
</footer>
