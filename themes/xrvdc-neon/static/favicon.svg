<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="XR VisionDevCamp">
  <!-- black rounded background -->
  <rect width="32" height="32" rx="3" fill="#050505"/>

  <!-- yellow HUD corner brackets (chunky so they survive 16x16 rasterization) -->
  <path d="M2,8 L2,2 L8,2" stroke="#ffea00" stroke-width="2.4" fill="none" stroke-linecap="square"/>
  <path d="M30,24 L30,30 L24,30" stroke="#ffea00" stroke-width="2.4" fill="none" stroke-linecap="square"/>

  <!-- magenta REC dot -->
  <circle cx="27.5" cy="4.5" r="2" fill="#ff006e"/>

  <!-- "XR" lettermark drawn as path geometry (font-independent) -->
  <g fill="#ff006e">
    <!-- X -->
    <polygon points="4.5,8.5 7.4,8.5 10,12.5 12.6,8.5 15.5,8.5 11.45,14.5 15.5,20.5 12.6,20.5 10,16.5 7.4,20.5 4.5,20.5 8.55,14.5"/>
    <!-- R -->
    <path d="M16.8,8.5 L23.4,8.5 Q26.6,8.5 26.6,12 Q26.6,15.1 23.7,15.45 L26.7,20.5 L23.6,20.5 L20.95,15.6 L19.55,15.6 L19.55,20.5 L16.8,20.5 Z M19.55,10.9 L19.55,13.2 L23,13.2 Q23.85,13.2 23.85,12.05 Q23.85,10.9 23,10.9 Z"/>
  </g>

  <!-- thicker yellow underline accent -->
  <rect x="5.5" y="23.2" width="21" height="1.4" fill="#ffea00" opacity="0.85"/>
</svg>
